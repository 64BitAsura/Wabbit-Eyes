<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wabbit Eyes — Global Vessel Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="ui-overlay">
    <div id="header">
      <h1>WABBIT <span class="accent">EYES</span></h1>
      <div id="stats">
        <span id="fps-counter">60 FPS</span>
        <span id="vessel-count">0 vessels</span>
        <span id="stream-status" class="disconnected">OFFLINE</span>
        <span id="intel-status" class="disconnected">INTEL OFF</span>
      </div>
    </div>
    <div id="classification-hud" class="hidden">
      <span class="hud-item normal-count">NORMAL: <strong id="hud-normal">0</strong></span>
      <span class="hud-item anomaly-count">ANOMALY: <strong id="hud-anomaly">0</strong></span>
      <span class="hud-item warming-count">WARMING: <strong id="hud-warming">0</strong></span>
    </div>
    <div id="tooltip" class="hidden"></div>
    <div id="anomaly-feed" class="hidden">
      <div id="anomaly-feed-header">ANOMALY FEED</div>
      <div id="anomaly-feed-list"></div>
    </div>
    <div id="controls">
      <label title="Toggle vessel trails">
        <input type="checkbox" id="toggle-trails" checked /> Trails
      </label>
      <label title="Toggle grid overlay">
        <input type="checkbox" id="toggle-grid" checked /> Grid
      </label>
      <label title="Toggle demo mode (client-side mock data)">
        <input type="checkbox" id="toggle-demo" /> Demo Mode
      </label>
      <label title="Toggle anomaly event feed panel">
        <input type="checkbox" id="toggle-feed" checked /> Feed
      </label>
      <label title="Toggle anomaly heatmap overlay">
        <input type="checkbox" id="toggle-heatmap" /> Heatmap
      </label>
    </div>
  </div>
  <canvas id="main-canvas"></canvas>

  <script src="three.min.js"></script>
  <script src="mock-client.js"></script>
  <script src="geo-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
